<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RealOrReel — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
<div class="container" style="max-width:400px;">
  <header>
    <div class="logo">RealOrReel</div>
    <p class="tagline">Admin Access</p>
  </header>

  <div class="card">
    <form method="GET" action="/admin">
      <div class="input-group" style="flex-direction:column; gap:12px;">
        <input type="password" name="code" placeholder="Enter admin code" required autocomplete="off" style="width:100%;"/>
        <button type="submit" style="width:100%;">Enter</button>
      </div>
      {% if error %}
      <p style="color:#dc2626; font-size:13px; margin-top:12px; text-align:center;">Invalid code. Try again.</p>
      {% endif %}
    </form>
  </div>
</div>
</body>
</html>
